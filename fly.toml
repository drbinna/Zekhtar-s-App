# Fly.io config for the Zek'thar backend.
# Run `fly launch --no-deploy` once to claim the app name, then `fly deploy`.
app = "zekthar-backend"
primary_region = "sjc"  # close to most US users; change if needed

[build]
  dockerfile = "Dockerfile"

[env]
  ZEKTHAR_HOSTED = "1"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  # Keep at least one machine running. Scale-to-zero would cold-start the first
  # request after idle and can interrupt long streaming sessions, so we don't
  # auto-stop. This stays within Fly's free allowance for a single small machine.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    # Streaming sessions are long-lived; allow plenty of concurrent connections
    # per machine. (This is server connection capacity, NOT the Anam session
    # limit — that's set on the Anam account and caps real avatar concurrency.)
    soft_limit = 200
    hard_limit = 250

  [[http_service.checks]]
    path = "/healthz"
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
