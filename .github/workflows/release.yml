name: Release macOS

on:
  push:
    tags:
      - "v*"  # Trigger on version tags like v1.0.0, v1.2.3-beta

  # Allow manual trigger from the Actions tab
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build without publishing (dry run)"
        type: boolean
        default: false

permissions:
  contents: write  # Needed to create GitHub Releases

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Both architectures in ONE electron-builder invocation so a single
      # latest-mac.yml is generated covering all artifacts. Separate per-arch
      # jobs each write their own latest-mac.yml and one clobbers the other,
      # which silently breaks electron-updater for half your users.
      - name: Build & sign & notarize (arm64 + x64)
        env:
          # ── Code signing ──
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

          # ── Notarization ──
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          npx electron-builder --mac dmg zip --arm64 --x64 \
            --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zekthar-macos
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.blockmap
            dist/latest*.yml
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      # draft: false — releases (and their download links) go live as soon as
      # the build finishes. latest*.yml must be attached or electron-updater
      # can't discover new versions.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            artifacts/*.dmg
            artifacts/*.zip
            artifacts/*.blockmap
            artifacts/latest*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
