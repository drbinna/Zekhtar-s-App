<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  html, body { margin: 0; padding: 0; background: transparent; overflow: hidden; }
  canvas { position: fixed; inset: 0; width: 100vw; height: 100vh; pointer-events: none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  let dpr = window.devicePixelRatio || 1;

  function resize() {
    dpr = window.devicePixelRatio || 1;
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  let flight = null;
  let resting = null;

  function easeInOut(t) { return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; }
  function bezier(t, p0, p1, p2) {
    const u = 1 - t;
    return u * u * p0 + 2 * u * t * p1 + t * t * p2;
  }

  function drawTriangle(x, y, angle, scale) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    ctx.scale(scale, scale);
    ctx.shadowColor = 'rgba(0, 229, 200, 0.65)';
    ctx.shadowBlur = 18;
    ctx.fillStyle = '#00E5C8';
    ctx.beginPath();
    ctx.moveTo(0, -14);
    ctx.lineTo(10, 10);
    ctx.lineTo(-10, 10);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.strokeStyle = '#06080C';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.restore();
  }

  function drawLabel(x, y, label) {
    if (!label) return;
    ctx.save();
    ctx.font = '600 12px -apple-system, system-ui, sans-serif';
    const metrics = ctx.measureText(label);
    const padX = 8;
    const w = metrics.width + padX * 2;
    const h = 22;
    let lx = x + 18;
    let ly = y - 10;
    if (lx + w > window.innerWidth - 8) lx = x - w - 18;
    if (ly < 8) ly = y + 14;
    const r = 6;
    ctx.fillStyle = 'rgba(6, 8, 12, 0.88)';
    ctx.strokeStyle = 'rgba(0, 229, 200, 0.55)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(lx + r, ly);
    ctx.arcTo(lx + w, ly, lx + w, ly + h, r);
    ctx.arcTo(lx + w, ly + h, lx, ly + h, r);
    ctx.arcTo(lx, ly + h, lx, ly, r);
    ctx.arcTo(lx, ly, lx + w, ly, r);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = '#C9D6E3';
    ctx.fillText(label, lx + padX, ly + 15);
    ctx.restore();
  }

  function frame(now) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (flight) {
      const t = Math.min(1, (now - flight.start) / flight.duration);
      const e = easeInOut(t);
      const midX = (flight.fromX + flight.toX) / 2;
      const midY = Math.min(flight.fromY, flight.toY) - 80;
      const x = bezier(e, flight.fromX, midX, flight.toX);
      const y = bezier(e, flight.fromY, midY, flight.toY);
      const dx = x - flight.lastX;
      const dy = y - flight.lastY;
      const angle = (dx === 0 && dy === 0) ? 0 : Math.atan2(dy, dx) + Math.PI / 2;
      const scale = 1 + Math.sin(t * Math.PI) * 0.6;
      drawTriangle(x, y, angle, scale);
      flight.lastX = x;
      flight.lastY = y;
      if (t >= 1) {
        resting = { x: flight.toX, y: flight.toY, label: flight.label };
        flight = null;
      }
    } else if (resting) {
      drawTriangle(resting.x, resting.y, 0, 1);
      drawLabel(resting.x, resting.y, resting.label);
    }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  window.overlayAPI.onPoint(({ x, y, label }) => {
    const fromX = resting ? resting.x : -40;
    const fromY = resting ? resting.y : window.innerHeight / 2;
    flight = {
      fromX, fromY,
      toX: x, toY: y,
      label: label || null,
      start: performance.now(),
      duration: 650,
      lastX: fromX, lastY: fromY,
    };
  });

  window.overlayAPI.onClear(() => {
    flight = null;
    resting = null;
  });
</script>
</body>
</html>
