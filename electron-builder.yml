appId: com.zekthar.desktop
productName: Zekthar
copyright: "Copyright © 2026"

directories:
  output: dist
  buildResources: build

# Files to include in the app bundle (relative to project root).
files:
  - "electron/**/*"
  - "server.js"
  - "public/**/*"
  - "package.json"
  # NOTE: .env is intentionally NOT bundled — it contains live API keys and the
  # .dmg is publicly downloadable. The app loads keys from the user's data dir
  # (~/Library/Application Support/Zekthar/.env) — see main.js env loading.
  - "!**/node_modules/*/{CHANGELOG.md,README.md,readme.md,README,readme}"
  - "!**/node_modules/.cache"
  - "!**/*.map"

# Native modules that need rebuilding for Electron.
npmRebuild: true

mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  category: public.app-category.utilities
  icon: build/icon.png
  darkModeSupport: true
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist

  # Code signing identity. electron-builder finds it automatically from your
  # keychain when building locally. For CI, set CSC_LINK and CSC_KEY_PASSWORD
  # environment variables (see .github/workflows/release.yml).

  # Notarization — temporarily disabled. Apple's notarytool service has been
  # returning HTTP 500 errors. Will re-enable once it stabilizes. To notarize
  # an already-built .dmg manually:
  #   xcrun notarytool submit dist/Zekthar-X.Y.Z-arm64.dmg \
  #     --apple-id "$APPLE_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" \
  #     --team-id "$APPLE_TEAM_ID" --wait
  #   xcrun stapler staple dist/Zekthar-X.Y.Z-arm64.dmg
  notarize: true

  # Extended attributes needed for screen recording and accessibility.
  extendInfo:
    NSMicrophoneUsageDescription: "Zekthar needs microphone access for voice conversation."
    NSScreenCaptureUsageDescription: "Zekthar needs screen recording to see what you're working on."
    NSAppleEventsUsageDescription: "Zekthar needs automation access to perform tasks on your behalf."

dmg:
  title: Zekthar
  artifactName: "Zekthar-${version}-${arch}.${ext}"

# Publish config — generates latest-mac.yml and tells electron-updater
# where to look for new versions.
publish:
  - provider: github
    owner: drbinna
    repo: Zekhtar-s-App
    releaseType: release

# Extra resources that are unpacked outside the asar (needed for native modules).
asarUnpack:
  - "node_modules/@nut-tree-fork/**"
  - "node_modules/node-gyp-build/**"

# Don't bundle dev dependencies.
buildDependenciesFromSource: false
